<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Noet WASM Test Runner</title>
        <style>
            body {
                font-family: monospace;
                padding: 20px;
                background: #1e1e1e;
                color: #d4d4d4;
                max-width: 900px;
                margin: 0 auto;
            }
            h1 {
                color: #4ec9b0;
            }
            h2 {
                color: #9cdcfe;
                margin-top: 1.5em;
                border-bottom: 1px solid #333;
                padding-bottom: 4px;
            }
            .pass {
                color: #4ec9b0;
            }
            .fail {
                color: #f48771;
                font-weight: bold;
            }
            .info {
                color: #858585;
            }
            .warn {
                color: #dcdcaa;
            }
            .result {
                margin: 3px 0;
            }
            .summary {
                margin-top: 24px;
                padding: 12px;
                border-radius: 4px;
                font-size: 1.2em;
                font-weight: bold;
            }
            .summary.success {
                background: #1a3a1a;
                color: #4ec9b0;
            }
            .summary.failure {
                background: #3a1a1a;
                color: #f48771;
            }
            .loading {
                color: #858585;
                font-style: italic;
            }
            pre {
                background: #252526;
                padding: 8px;
                border-radius: 3px;
                overflow-x: auto;
                font-size: 0.85em;
            }
        </style>
    </head>
    <body>
        <h1>🧪 Noet WASM Test Runner</h1>
        <div id="output"><p class="loading">Loading WASM module and test data…</p></div>

        <script type="module">
            const out = document.getElementById("output");
            let passed = 0,
                failed = 0;

            function log(msg, type = "info") {
                const d = document.createElement("div");
                d.className = `result ${type}`;
                d.textContent = msg;
                out.appendChild(d);
                console.log(`[${type.toUpperCase()}] ${msg}`);
            }

            function section(title) {
                const h = document.createElement("h2");
                h.textContent = title;
                out.appendChild(h);
            }

            function assert(condition, message) {
                if (condition) {
                    log(`✅ ${message}`, "pass");
                    passed++;
                } else {
                    log(`❌ ${message}`, "fail");
                    failed++;
                }
            }

            async function run() {
                try {
                    out.innerHTML = "";

                    // ── Initialization ───────────────────────────────────────────────
                    section("Initialization");

                    const { default: init, BeliefBaseWasm } =
                        await import("/target/wasm-build/pkg/noet_core.js");
                    await init();
                    assert(true, "WASM module loaded and initialized");

                    const indexResp = await fetch("./test-output/index.html");
                    assert(indexResp.ok, "test-output/index.html is accessible");
                    const indexDoc = new DOMParser().parseFromString(
                        await indexResp.text(),
                        "text/html",
                    );
                    const entryBidEl = indexDoc.getElementById("noet-entry-bid");
                    assert(entryBidEl !== null, "noet-entry-bid script tag found in index.html");
                    const entryBid = JSON.parse(entryBidEl.textContent);
                    assert(
                        typeof entryBid === "string" && entryBid.length > 0,
                        `Entry BID extracted: ${entryBid}`,
                    );

                    const jsonResp = await fetch("./test-output/beliefbase.json");
                    assert(jsonResp.ok, "test-output/beliefbase.json is accessible");
                    const json = await jsonResp.text();
                    log(`Loaded ${(json.length / 1024).toFixed(1)} KB of beliefbase JSON`, "info");

                    const bb = new BeliefBaseWasm(json, entryBid);
                    assert(bb !== null, "BeliefBaseWasm constructed from JSON");

                    // ── Basic queries ────────────────────────────────────────────────
                    section("Basic Queries");

                    const nodeCount = bb.node_count();
                    assert(nodeCount > 0, `node_count() > 0 (got ${nodeCount})`);

                    const documents = bb.get_documents();
                    assert(
                        Array.isArray(documents) && documents.length > 0,
                        `get_documents() returns non-empty array (${documents.length} docs)`,
                    );
                    log(`Documents: ${documents.map((d) => d.title).join(", ")}`, "info");

                    const networks = bb.get_networks();
                    assert(
                        Array.isArray(networks) && networks.length > 0,
                        `get_networks() returns non-empty array (${networks.length} networks)`,
                    );
                    log(`Networks: ${networks.map((n) => n.title).join(", ")}`, "info");

                    // ── Node retrieval ───────────────────────────────────────────────
                    section("Node Retrieval");

                    const doc0 = documents[0];
                    const byBid = bb.get_by_bid(doc0.bid);
                    assert(byBid !== null, `get_by_bid() finds a known document`);
                    assert(byBid.bid === doc0.bid, `get_by_bid() returns node with correct BID`);
                    assert(
                        byBid.title === doc0.title,
                        `get_by_bid() returns node with correct title`,
                    );

                    const missing = bb.get_by_bid("not-a-valid-bid");
                    assert(
                        missing === null || missing === undefined,
                        "get_by_bid() returns null for unknown BID",
                    );

                    // ── NodeContext ──────────────────────────────────────────────────
                    section("NodeContext");

                    const ctx = bb.get_context(doc0.bid);
                    assert(ctx !== null, `get_context() returns a value for "${doc0.title}"`);
                    assert(
                        ctx.node && ctx.node.bid === doc0.bid,
                        "NodeContext.node has correct BID",
                    );
                    assert(typeof ctx.root_path === "string", "NodeContext.root_path is a string");
                    assert(
                        ctx.root_path.length > 0,
                        `NodeContext.root_path is non-empty: "${ctx.root_path}"`,
                    );
                    assert(
                        typeof ctx.home_net === "string" && ctx.home_net.length > 0,
                        `NodeContext.home_net is a non-empty string: ${ctx.home_net}`,
                    );

                    const relatedCount = Object.keys(ctx.related_nodes).length;
                    log(`Related nodes for "${doc0.title}": ${relatedCount}`, "info");
                    if (relatedCount > 0) {
                        const sampleBid = Object.keys(ctx.related_nodes)[0];
                        const rel = ctx.related_nodes[sampleBid];
                        assert(
                            rel.node && rel.node.bid === sampleBid,
                            "related_nodes entries have correct BID",
                        );
                        assert(
                            typeof rel.root_path === "string",
                            "related_nodes entries have root_path string",
                        );
                    }

                    // ── Navigation tree ──────────────────────────────────────────────
                    section("Navigation Tree");

                    const tree = bb.get_nav_tree();
                    assert(tree !== null, "get_nav_tree() returns a value");
                    assert(
                        Array.isArray(tree.roots) && tree.roots.length > 0,
                        `NavTree.roots is non-empty array (${tree.roots?.length} roots)`,
                    );

                    // nodes may come back as a Map or plain object depending on wasm-bindgen version
                    const getNode = (bid) =>
                        tree.nodes instanceof Map ? tree.nodes.get(bid) : tree.nodes[bid];
                    const allBids =
                        tree.nodes instanceof Map
                            ? Array.from(tree.nodes.keys())
                            : Object.keys(tree.nodes);

                    assert(
                        allBids.length > 0,
                        `NavTree.nodes is non-empty (${allBids.length} nodes)`,
                    );

                    // Spot-check a few nodes
                    let structureOk = true;
                    for (const bid of allBids.slice(0, 10)) {
                        const node = getNode(bid);
                        if (
                            !node ||
                            typeof node.title !== "string" ||
                            !Array.isArray(node.children)
                        ) {
                            structureOk = false;
                            log(`  Bad node at BID ${bid}: ${JSON.stringify(node)}`, "warn");
                        }
                    }
                    assert(structureOk, "Sampled NavNode entries have title and children fields");

                    // Root nodes are reachable
                    let rootsOk = true;
                    for (const rootBid of tree.roots) {
                        if (!getNode(rootBid)) {
                            rootsOk = false;
                            break;
                        }
                    }
                    assert(rootsOk, "All root BIDs resolve to nodes in the map");

                    // Parent/child cross-references are consistent
                    let refsOk = true;
                    for (const bid of allBids) {
                        const node = getNode(bid);
                        for (const childBid of node.children || []) {
                            if (!getNode(childBid)) {
                                refsOk = false;
                                break;
                            }
                        }
                        if (node.parent && !getNode(node.parent)) {
                            refsOk = false;
                            break;
                        }
                    }
                    assert(refsOk, "All parent/child BID cross-references resolve");

                    // No cycles (parent chain terminates for every node)
                    let noCycles = true;
                    for (const bid of allBids) {
                        const visited = new Set();
                        let cur = bid;
                        while (cur) {
                            if (visited.has(cur)) {
                                noCycles = false;
                                break;
                            }
                            visited.add(cur);
                            cur = getNode(cur)?.parent;
                        }
                        if (!noCycles) break;
                    }
                    assert(noCycles, "No cycles detected in parent chains");

                    // All non-root nodes with a real path use .html extension
                    let pathsOk = true;
                    const bidRe = /^[0-9a-f-]{36}$/;
                    for (const bid of allBids) {
                        const node = getNode(bid);
                        const p = node?.path;
                        if (
                            p &&
                            p.length > 0 &&
                            !bidRe.test(p) &&
                            !p.endsWith(".html") &&
                            !p.includes(".html#")
                        ) {
                            log(`  Unexpected path extension: ${p}`, "warn");
                            pathsOk = false;
                        }
                    }
                    assert(pathsOk, "All NavNode paths use .html extension (or are BID/empty)");

                    // ── System namespaces ────────────────────────────────────────────────
                    section("System Namespaces");

                    const nsOk = (ns, name) => {
                        const ok =
                            ns !== null &&
                            typeof ns === "object" &&
                            typeof ns.bid === "string" &&
                            ns.bid.length > 0 &&
                            typeof ns.bref === "string" &&
                            ns.bref.length > 0;
                        assert(ok, `${name}() returns {bid, bref} object (bid=${ns?.bid})`);
                    };
                    nsOk(BeliefBaseWasm.href_namespace(), "href_namespace");
                    nsOk(BeliefBaseWasm.asset_namespace(), "asset_namespace");
                    nsOk(BeliefBaseWasm.buildonomy_namespace(), "buildonomy_namespace");

                    // ── Summary ──────────────────────────────────────────────────────
                    const summary = document.createElement("div");
                    summary.className = `summary ${failed === 0 ? "success" : "failure"}`;
                    summary.textContent =
                        failed === 0
                            ? `✅ All ${passed} tests passed`
                            : `❌ ${failed} failed, ${passed} passed`;
                    out.appendChild(summary);

                    if (failed === 0) {
                        console.log(
                            "%c✅ ALL TESTS PASSED",
                            "color:#4ec9b0;font-size:20px;font-weight:bold",
                        );
                    } else {
                        console.error(`❌ ${failed} TEST(S) FAILED`);
                    }
                } catch (err) {
                    const summary = document.createElement("div");
                    summary.className = "summary failure";
                    summary.innerHTML = `<strong>💥 Fatal error</strong><br>${err.message}<br><pre>${err.stack}</pre>`;
                    out.appendChild(summary);
                    console.error("Test runner error:", err);
                }
            }

            run();
        </script>
    </body>
</html>
